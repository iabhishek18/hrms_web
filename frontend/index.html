<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5"
    />
    <meta
      name="description"
      content="HRMSLite - Modern Human Resource Management System for growing teams. Manage employees, attendance, leave, and departments."
    />

    <!-- Theme color — adapts to light/dark mode -->
    <meta
      name="theme-color"
      content="#6366f1"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0f172a"
      media="(prefers-color-scheme: dark)"
    />

    <!-- PWA-ready meta tags -->
    <meta name="application-name" content="HRMSLite" />
    <meta name="apple-mobile-web-app-title" content="HRMSLite" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#6366f1" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="HRMSLite — Human Resource Management System"
    />
    <meta
      property="og:description"
      content="Modern HR Management System for growing teams. Manage employees, attendance, leave, and departments."
    />
    <meta property="og:site_name" content="HRMSLite" />

    <title>HRMSLite — Human Resource Management System</title>

    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent FOUC (Flash of Unstyled Content) for dark mode -->
    <script>
      try {
        const stored = localStorage.getItem("hrms-theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        if (stored === "dark" || (!stored && prefersDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      } catch (e) {}
    </script>

    <!-- Critical CSS for initial loading screen to prevent white flash -->
    <style>
      /* Minimal loading styles before JS loads */
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: 100dvh;
      }
      body:not(.loaded) {
        overflow: hidden;
      }
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        background-color: #f8fafc;
        transition: background-color 0.2s;
      }
      html.dark #root:empty {
        background-color: #0f172a;
      }
      #root:empty::after {
        content: "";
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: initial-spin 0.8s linear infinite;
      }
      html.dark #root:empty::after {
        border-color: #1e293b;
        border-top-color: #818cf8;
      }
      @keyframes initial-spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* Prevent tap highlight on mobile */
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <noscript>
      <div
        style="
          padding: 2rem;
          text-align: center;
          font-family: &quot;Inter&quot;, system-ui, sans-serif;
          max-width: 480px;
          margin: 0 auto;
        "
      >
        <div
          style="
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: #6366f1;
            margin-bottom: 1rem;
          "
        >
          <span style="color: white; font-weight: 700; font-size: 1.25rem"
            >HR</span
          >
        </div>
        <h1 style="font-size: 1.25rem; color: #1e293b; margin: 0 0 0.5rem">
          JavaScript Required
        </h1>
        <p style="font-size: 0.875rem; color: #64748b; line-height: 1.5">
          HRMSLite requires JavaScript to run. Please enable JavaScript in your
          browser settings and reload the page.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
